<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ჩემი ანგარიში</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/account.css">
</head>
<body>
  <div class="card">
    <span class="fire-icon">🔥</span>
    <h1>ჩემი ანგარიში</h1>
    <hr class="divider">
    <div class="info-row"><span class="info-icon">👤</span><div><div class="info-label">სახელი</div><div class="info-value" id="display-name">იტვირთება...</div></div></div>
    <div class="info-row"><span class="info-icon">📧</span><div><div class="info-label">ელ-ფოსტა</div><div class="info-value" id="email">იტვირთება...</div></div></div>
    <div class="info-row"><span class="info-icon">✅</span><div><div class="info-label">სტატუსი</div><div class="info-value" id="status">იტვირთება...</div></div></div>
    <hr class="divider">
    <button class="btn-logout" id="logout-btn">🚪 გამოსვლა</button>
    <br>
    <a href="/basket.html" class="btn-back">← მთავარ გვერდზე</a>
  </div>
  <script type="module" src="/account.js"></script>
</body>
</html>
