<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ვერიფიკაცია - Fireplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #020a18;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #starsCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .verify-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,122,30,0.2);
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(255,122,30,0.05);
            animation: cardIn 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .check-circle {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,122,30,0.2), rgba(255,122,30,0.05));
            border: 2px solid rgba(255,122,30,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 2.8rem;
            animation: checkIn 0.6s ease 0.5s both;
            transform: scale(0);
        }

        @keyframes checkIn {
            0% { transform: scale(0) rotate(-20deg); }
            70% { transform: scale(1.15) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .glow-ring {
            position: absolute;
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 1px solid rgba(255,122,30,0.2);
            top: 56px; left: 50%;
            transform: translateX(-50%);
            animation: ringPulse 2s ease-in-out 1s infinite;
        }

        @keyframes ringPulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            100% { transform: translateX(-50%) scale(1.8); opacity: 0; }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff7a1e;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.3s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.7s forwards;
        }

        h1 span { color: #ff7a1e; }

        p {
            color: rgba(255,255,255,0.55);
            font-size: 0.92rem;
            line-height: 1.7;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.9s forwards;
        }

        .redirect-bar {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.1s forwards;
        }

        .redirect-bar span {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            flex: 1;
            text-align: left;
        }

        .redirect-bar span b {
            color: #ff9a4d;
            font-weight: 600;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 24px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.1s forwards;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #ff7a1e, #e05500);
            border-radius: 2px;
            width: 0%;
            animation: progressGo 4s linear 1.5s forwards;
        }

        @keyframes progressGo {
            to { width: 100%; }
        }

        .go-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ff7a1e, #e05500);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,122,30,0.35);
            opacity: 0;
            animation: fadeUp 0.6s ease 1.3s forwards;
        }

        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255,122,30,0.5);
        }

        .counter {
            font-size: 1rem;
            font-weight: 700;
            color: #ff7a1e;
            min-width: 24px;
            text-align: center;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
            font-size: 1.2rem;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>

<div class="verify-card">
    <div class="glow-ring"></div>
    <div class="logo">🔥 Fireplace</div>
    <div class="check-circle">✅</div>
    <h1>ვერიფიკაცია<br><span>წარმატებით!</span></h1>
    <p>შენი ელ-ფოსტა დადასტურდა!<br>ახლა შეგიძლია შეხვიდე შენს ანგარიშზე.</p>

    <div class="redirect-bar">
        <span>ავტომატურად გადამისამართება <b id="countDisplay">5</b> წამში...</span>
    </div>

    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>

    <a href="/basket.html" class="go-btn">
        შესვლა საიტზე &#8594;
    </a>
</div>

<script>
    // STARS
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 1.8 + 0.2,
            speedY: Math.random() * 0.12 + 0.03,
            opacity: Math.random() * 0.7 + 0.3,
            twinkleSpeed: Math.random() * 0.018 + 0.004,
            twinkleOffset: Math.random() * Math.PI * 2,
        });
    }

    let frame = 0;
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;
        stars.forEach(s => {
            s.y += s.speedY;
            if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            const twinkle = Math.sin(frame * s.twinkleSpeed + s.twinkleOffset);
            const op = s.opacity * (0.55 + 0.45 * twinkle);
            if (s.size > 1.3) {
                const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 5);
                g.addColorStop(0, `rgba(255,200,150,${op * 0.3})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,235,200,${op})`; ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // FLOATING FIRE PARTICLES
    const emojis = ['🔥', '✨', '⭐', '💫'];
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (6 + Math.random() * 8) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        p.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
        document.body.appendChild(p);
    }

    // COUNTDOWN + REDIRECT
    let count = 5;
    const countEl = document.getElementById('countDisplay');

    setTimeout(() => {
        const timer = setInterval(() => {
            count--;
            if (countEl) countEl.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = '/basket.html';
            }
        }, 1000);
    }, 1500);
</script>
</body>
</html>
