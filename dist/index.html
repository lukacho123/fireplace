<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in and Sign up form</title>
  <script src="https://kit.fontawesome.com/553a533a1a.js" crossorigin="anonymous"></script>
  <script type="module" crossorigin src="/assets/index-zkTBEjtM.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CqyErGo3.css">
</head>
<body>
  <div class="container maincontanier">
    <div class="form-box">
      <h1 id="title">Sign Up</h1>
      <form method="POST">
        <div class="input-group">
          <div class="input-field" id="nameField">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Name" name="name" id="name" />
          </div>

          <div class="input-field">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Email" name="email" id="email" />
          </div>

          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password" name="password" id="password" />
          </div>
          <p>Lost password <a href="#">Click Here!</a></p>
        </div>
        <div class="btn-field">
          <button type="submit" id="signupBtn">Sign up</button>
          <button type="submit" id="signinBtn" class="disable">Sign in</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
